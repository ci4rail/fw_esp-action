name: ESP32 Secure App Workflow

on:
  workflow_call:
    inputs:
      firmware_variant:
        description: "Firmware variant name (e.g., default)"
        required: true
        type: string
        # release_defs: >-
        #  [
        #   {
        #     "name": "sio02-02",
        #     "hwname": "sio02",
        #     "artgroup": "S103",
        #     "major": "2",
        #     "test-name": "sio02-test",
        #     "test-device-name": "sio02-1"
        #   },
        #   {
        #     "name": "sio02-03",
        #     ...
        #  ]

      release_defs:
        type: string
        required: true
        description: "JSON array with meta data for the releases to create"

      firmware_signing_azure_subscription_id:
        required: true
        type: string
      firmware_signing_azure_tenant_id:
        required: true
        type: string
      build-dfu:
        description: "Whether to build dfu binary"
        required: false
        type: boolean
        default: false
      teststation-broker:
        description: "IP:Port of MQTT broker where test station listens to"
        type: string
        required: true
      teststation-master-topic:
        description: "teststation request is published to <master-topic>/request"
        required: false
        type: string
        default: "teststation"
      teststation-request-timeout:
        description: "Time in seconds to wait for teststation to become available"
        required: false
        type: number
        default: 3600
      target-commitish:
        description: "The commitish value that determines where the Git tag is created from. Can be any branch or commit SHA. Default: the repository's default branch (usually main)."
        type: string
        required: false
        default: ""
      minio-bucket:
        description: "bucket on minio to push test images to"
        type: string
        required: false
        default: "esp-fw-testing"
      bootloader-repo:
        description: "Repository where to get bootloader from"
        type: string
        required: true
      bootloader-release-tag:
        description: "Release tag for the bootloader"
        type: string
        required: true
      license-contact:
        description: "License contact email"
        type: string
        required: true
      company:
        description: "Company name"
        type: string
        required: true

    secrets:
      access-token:
        description: "Personal access token for private repos"
        required: true
      tailscale-key:
        description: "a reusable tailscale key"
        required: true
      minio-access-key:
        description: "Access key for minio"
        required: true
      minio-secret-key:
        description: "Secret key for minio"
        required: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64]

    outputs:
      project-name: ${{ steps.build_app.outputs.project-name }}
      version: ${{ steps.build_app.outputs.version }}
      app-file: ${{ steps.build_app.outputs.app-file }}
      chip: ${{ steps.build_app.outputs.chip }}
      licensing-info: ${{ steps.licensing.outputs.licensing-info-file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.access-token }}

      - name: Unshallow submodules and force-refresh tags
        shell: bash
        run: |
          git submodule foreach --recursive '
            # Unshallow if the submodule was fetched shallow
            if git rev-parse --is-shallow-repository | grep -q true; then
              git fetch --unshallow origin
            fi
            # Force-update tags to pick up rewritten (lightweight → annotated) tags
            git fetch origin --tags --force --prune
          '
      - name: Start esp-idf Devcontainer
        uses: ci4rail/fw_esp-action/actions/setup_devcontainer@v11

      - name: Build App
        id: build_app
        uses: ci4rail/fw_esp-action/actions/build_app@v11
        with:
          app-build-command: make build-secure
          build-dfu: ${{ inputs.build-dfu }}

      - name: Generate Licensing Info
        uses: ci4rail/fw_esp-action/actions/licensing@v11
        id: licensing
        with:
          build-dir: ${{ steps.build_app.outputs.build-dir }}
          project-name: ${{ steps.build_app.outputs.project-name }}
          version: ${{ steps.build_app.outputs.version }}
          license-contact: ${{ inputs.license-contact }}
          company: ${{ inputs.company }}

      - name: Upload build outputs to artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: build_output
          path: |
            ${{ steps.build_app.outputs.app-file-path }}
            ${{ steps.build_app.outputs.build-dir}}/partition_table/partition-table.bin
            ${{ steps.build_app.outputs.build-dir}}/ota_data_initial.bin
            ${{ steps.build_app.outputs.build-dir}}/flash_project_args
            ${{ steps.licensing.outputs.licensing-info-path }}

      - name: tear down devcontainer
        if: ${{ always() }}
        uses: ci4rail/fw_esp-action/actions/teardown_devcontainer@v11

  sign:
    needs: build
    permissions:
      id-token: write # required for OIDC
      contents: read
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        env:
          - name: staging
          - name: production
    environment: ${{ matrix.env.name }}
    steps:
      # we need to checkout repo, as we need devcontainer.json
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start esp-idf Devcontainer
        uses: ci4rail/fw_esp-action/actions/setup_devcontainer@v11

      - uses: actions/download-artifact@v4
        with:
          name: build_output
          path: in/

      - name: List Files
        run: |
          ls -l in/

      - name: Generate signature
        id: gen_signature
        uses: ci4rail/fw_esp-action/actions/azure_key_vault_sign@v11
        with:
          binary: in/${{ needs.build.outputs.app-file }}
          azure_subscription_id: ${{ inputs.firmware_signing_azure_subscription_id }}
          azure_tenant_id: ${{ inputs.firmware_signing_azure_tenant_id }}
          azure_app_id: ${{ vars.FIRMWARE_SIGNING_AZURE_APP_ID }}
          key_ids: ${{ vars.FIRMWARE_SIGNING_AZURE_KEY_ID }}

      - name: Sign image with espsecure
        id: sign
        uses: ci4rail/fw_esp-action/actions/esp_sign@v11
        with:
          binary: in/${{ needs.build.outputs.app-file }}

      - name: Upload build outputs to artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: sign_output-${{ matrix.env.name }}
          path: |
            ${{ steps.sign.outputs.signed-binary-path }}

      - name: tear down devcontainer
        if: ${{ always() }}
        uses: ci4rail/fw_esp-action/actions/teardown_devcontainer@v11

  package:
    needs: [build, sign]
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        env:
          - name: staging
          - name: production
        release_def: ${{ fromJson(inputs.release_defs) }}

    name: package ${{ matrix.env.name }} → ${{ matrix.release_def.name }}
    outputs:
      dummy: ${{ steps.gen_outputs.outputs.dummy }}  # not really used
    environment: ${{ matrix.env.name }}
    steps:
      # we need to checkout repo, as we need devcontainer.json
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start esp-idf Devcontainer
        uses: ci4rail/fw_esp-action/actions/setup_devcontainer@v11

      - uses: actions/download-artifact@v4
        with:
          name: sign_output-${{ matrix.env.name }}
          path: in/

      - name: Get app binary path
        id: get_app_binary
        run: |
          ls -l in/
          app_binary_path=$(ls in/*.bin)
          echo "app-binary-path=${app_binary_path}" >> $GITHUB_OUTPUT

      - name: Create firmware package
        id: create_fwpkg
        uses: ci4rail/fw_esp-action/actions/create_firmware_package@v11
        with:
          article-group: ${{ matrix.release_def.artgroup }}
          hwname: ${{ matrix.release_def.hwname }}
          major-revision: ${{ matrix.release_def.major }}
          variant: ${{ inputs.firmware_variant }}
          output-file-suffix: "-${{ matrix.env.name }}"
          app-binary: ${{ steps.get_app_binary.outputs.app-binary-path }}
          version: ${{ needs.build.outputs.version }}

      - name: Download bootloader
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ inputs.bootloader-repo }}
          tag: ${{ inputs.bootloader-release-tag }}
          token: ${{ secrets.access-token }}
          fileName: "*"
          out-file-path: in/

      - name: Build Merged Factory binary
        id: factory_image
        uses: ci4rail/fw_esp-action/actions/factory_image@v11
        with:
          chip: ${{ needs.build.outputs.chip }}
          build-dir: in/
          app-file: ${{ steps.get_app_binary.outputs.app-binary-path }}
          bootloader-file-pattern: "*bootloader*-${{ matrix.env.name }}.bin"
          output-file: fw-${{ matrix.release_def.hwname }}-${{ matrix.release_def.major }}-${{ inputs.firmware_variant }}-${{ needs.build.outputs.version }}-${{ matrix.env.name }}-factory.bin

      - name: Upload firmware packages to artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: fwpkg-${{ matrix.env.name }}-${{ matrix.release_def.name }}
          path: |
            ${{ steps.create_fwpkg.outputs.fwpkg }}
            in/${{ steps.factory_image.outputs.factory-image-file }}
          retention-days: 2

      - id: gen_outputs
        run: |
          echo "fwpkg_${{ matrix.env.name }}_${{ matrix.release_def.name }}=${{ steps.create_fwpkg.outputs.fwpkg }}" >> $GITHUB_OUTPUT
          echo "factory-image_${{ matrix.env.name }}_${{ matrix.release_def.name }}=${{ steps.factory_image.outputs.factory-image-file }}" >> $GITHUB_OUTPUT

      - name: tear down devcontainer
        if: ${{ always() }}
        uses: ci4rail/fw_esp-action/actions/teardown_devcontainer@v11

  # Execute steps in an github runner (not selfhosted)
  # Furthermore, teststation-action uses tailscale to access test stations, which won't run in selfhosted dind runner
  test-staging:
    if: inputs.test-name != ''
    needs: [build, sign, package]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: 
          - name: staging # only staging
        release_def: ${{ fromJson(inputs.release_defs) }}
    name: test-staging → ${{ matrix.release_def.name }}
    environment: ${{ matrix.env.name }}
    steps:
      - name: get outputs from package job
        id: get_package_outputs
        run: |
          echo '${{ toJSON(needs.package.outputs) }}'

      - name: Execute Test on Test station
        uses: ci4rail/fw_esp-action/actions/test@v11
        id: test
        with:
          artifact-folder: fwpkg-staging-${{ matrix.release_def.name }}
          teststation-broker: ${{ inputs.teststation-broker }}
          teststation-master-topic: ${{ inputs.teststation-master-topic }}
          teststation-request-timeout: ${{ inputs.teststation-request-timeout }}
          test-name: ${{ matrix.release_def.test-name }}
          test-device-name: ${{ matrix.release_def.test-device-name }}
          minio-access-key: ${{ secrets.minio-access-key }}
          minio-secret-key: ${{ secrets.minio-secret-key }}
          minio-bucket: ${{ inputs.minio-bucket }}
          access-token: ${{ secrets.access-token }}
          tailscale-key: ${{ secrets.tailscale-key }}
          project-name: ${{ needs.build.outputs.project-name }}
          version: ${{ needs.build.outputs.version }}

  release:
    needs: [build, sign, test-staging]
    if: ${{ always() && (github.ref_type == 'tag') && (needs.test-staging.result == 'success' || needs.test-staging.result == 'skipped') && (needs.build.result == 'success') && (needs.sign.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      # we need to checkout the repo to generate the release notes for the public repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.access-token }}

      - name: Download firmware packages
        uses: actions/download-artifact@v5
        with:
          pattern: fwpkg-*
          path: ./fwpkg
          merge-multiple: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: build_output
          path: ./build-artifacts

      - shell: bash
        run: |
          ls -l fwpkg
          ls -l build-artifacts

      - name: Create Release in this Repo
        uses: ci4rail/fw_esp-action/actions/release@v11
        with:
          target_commitish: ${{ inputs.target-commitish }}
          assets: |
            fwpkg/*
            fwpkg/in/*
            build-artifacts/${{ needs.build.outputs.licensing-info }}

      - name: Create Release in Public Repo
        if: ${{ inputs.public-release-repo != '' }}
        uses: ci4rail/fw_esp-action/actions/release_public@v11
        with:
          public-repo: ${{ inputs.public-release-repo }}
          assets: |
            fwpkg/*production*.fwpkg
            build-artifacts/${{ needs.build.outputs.licensing-info }}
          access-token: ${{ secrets.access-token }}
